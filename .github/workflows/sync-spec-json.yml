name: Sync spec JSON from YAML

on:
  push:
    branches: [main]
    paths:
      - 'specs/**/*.yaml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Use a token that can push back to main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install Python dependencies
        run: python -m pip install pyyaml==6.0.2

      - name: Convert all YAML specs to JSON
        run: |
          python3 - <<'EOF'
          import glob, json, re
          import yaml

          changed_json = []
          json_files = []  # Track all generated JSON files for .gitignore
          
          for yaml_path in glob.glob('specs/**/*.yaml', recursive=True):
              json_path = yaml_path.rsplit('.yaml', 1)[0] + '.json'
              json_files.append(json_path)
              
              with open(yaml_path, 'r', encoding='utf-8') as f:
                  data = yaml.safe_load(f)
              new_json = json.dumps(data, indent=2, ensure_ascii=False) + '\n'
              try:
                  with open(json_path, 'r', encoding='utf-8') as f:
                      existing = f.read()
              except FileNotFoundError:
                  existing = None
              if existing != new_json:
                  with open(json_path, 'w', encoding='utf-8') as f:
                      f.write(new_json)
                  changed_json.append(json_path)
                  print(f'Updated: {json_path}')
              else:
                  print(f'Unchanged: {json_path}')

          if not changed_json:
              print('No JSON files needed updating.')

          # Update .gitignore with generated JSON file paths
          gitignore_path = '.gitignore'
          with open(gitignore_path, 'r', encoding='utf-8') as f:
              gitignore_content = f.read()
          
          # Find the section for auto-generated JSON files
          marker_start = '# Auto-generated spec JSON files'
          marker_end = 'specs/'
          
          if marker_start in gitignore_content:
              # Extract the current gitignore up to the marker
              before_marker = gitignore_content[:gitignore_content.find(marker_start)]
              
              # Rebuild the gitignore with updated JSON file list
              new_gitignore = before_marker + marker_start + '\n'
              new_gitignore += '# Only ignore JSON files that have matching YAML sources - updated by sync-spec-json.yml\n'
              for json_file in sorted(json_files):
                  new_gitignore += json_file + '\n'
              
              with open(gitignore_path, 'w', encoding='utf-8') as f:
                  f.write(new_gitignore)
              
              print(f'Updated .gitignore with {len(json_files)} generated JSON files')
          
          # Store json_files as output for next step
          with open('json_files.txt', 'w') as f:
              for j in json_files:
                  f.write(j + '\n')
          EOF

      - name: Update .gitignore if JSON list changed
        run: |
          git add .gitignore
          if git diff --cached --quiet .gitignore; then
            echo ".gitignore unchanged"
          else
            echo ".gitignore was updated"
          fi

      - name: Commit updated JSON files and .gitignore
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add specs/**/*.json .gitignore
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore: sync JSON specs from YAML [skip ci]"
            git push
          fi
