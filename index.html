<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WID 3.0 API Docs</title>
    <link rel="stylesheet" href="vendor/swagger-ui/swagger-ui.css" />
    <style>
      body { margin: 0; }
    </style>
  </head>
  <body>
    <div id="swagger-ui"></div>

    <script src="vendor/swagger-ui/swagger-ui-bundle.js"></script>
    <script>
      window.onload = function () {
        const defaultSpecName = "WID 3.0 - National Draft";
        const defaultSpecSourceYamlPath = "specs/wid-3.0/draft.yaml";
        const defaultSpecJsonPath = "specs/wid-3.0/draft.json";
        const defaultSpecPath = defaultSpecJsonPath;
        const specs = [
          {
            name: defaultSpecName,
            url: defaultSpecPath,
          },
          {
            name: "Oregon WID 2.8 (reference)",
            url: "specs/reference/oregon-wid-2.8.yaml",
          },
        ];

        const params = new URLSearchParams(window.location.search);
        const requested = params.get("spec");
        const requestedSpec = specs.find((s) => {
          if (s.name === requested || s.url === requested) {
            return true;
          }

          // Backward compatibility: treat explicit draft YAML selection as the same default draft target.
          if (s.name === defaultSpecName && requested === defaultSpecSourceYamlPath) {
            return true;
          }

          return false;
        });
        const defaultSpec = requestedSpec || specs.find((s) => s.name === defaultSpecName) || specs[0];
        const resolvedSpecs = specs.map((s) => ({
          name: s.name,
          url: new URL(s.url, window.location.href).toString(),
        }));
        const resolvedDefaultSpec = {
          name: defaultSpec.name,
          url: new URL(defaultSpec.url, window.location.href).toString(),
        };

        const hasStandalonePreset = typeof SwaggerUIBundle.SwaggerUIStandalonePreset !== "undefined";
        const presets = [SwaggerUIBundle.presets.apis];
        if (hasStandalonePreset) {
          presets.push(SwaggerUIBundle.SwaggerUIStandalonePreset);
        }
        const resolvedDefaultSpecJsonUrl = new URL(defaultSpecJsonPath, window.location.href).toString();
        let attemptedJsonFallback = false;

        function bootSwagger(targetUrl, targetName) {
          SwaggerUIBundle({
            // Force a concrete default so current draft always renders by default.
            url: targetUrl,
            urls: resolvedSpecs,
            "urls.primaryName": targetName,
            dom_id: "#swagger-ui",
            presets,
            layout: hasStandalonePreset ? "StandaloneLayout" : "BaseLayout",
            deepLinking: true,
            onFailure: function () {
              // Some Swagger UI builds fail to parse YAML; fall back to JSON mirror for the draft spec.
              if (!attemptedJsonFallback && targetUrl === resolvedDefaultSpec.url) {
                attemptedJsonFallback = true;
                bootSwagger(resolvedDefaultSpecJsonUrl, defaultSpecName);
              }
            },
          });
        }

        bootSwagger(resolvedDefaultSpec.url, resolvedDefaultSpec.name);
      };
    </script>
  </body>
</html>
