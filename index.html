<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WID 3.0 API Docs</title>
    <link rel="stylesheet" href="vendor/swagger-ui/swagger-ui.css" />
    <style>
      body { margin: 0; }
    </style>
  </head>
  <body>
    <div id="swagger-ui"></div>

    <script src="vendor/swagger-ui/swagger-ui-bundle.js"></script>
    <script>
      window.onload = function () {
        const defaultSpecName = "WID 3.0 - National Draft";
        const defaultSpecPath = "specs/wid-3.0/draft.yaml";
        const specs = [
          {
            name: defaultSpecName,
            url: defaultSpecPath,
          },
          {
            name: "Oregon WID 2.8 (reference)",
            url: "specs/reference/oregon-wid-2.8.yaml",
          },
        ];

        const params = new URLSearchParams(window.location.search);
        const requested = params.get("spec");
        const requestedSpec = specs.find((s) => s.name === requested || s.url === requested);
        const defaultSpec = requestedSpec || specs.find((s) => s.name === defaultSpecName) || specs[0];
        const resolvedSpecs = specs.map((s) => ({
          name: s.name,
          url: new URL(s.url, window.location.href).toString(),
        }));
        const resolvedDefaultSpec = {
          name: defaultSpec.name,
          url: new URL(defaultSpec.url, window.location.href).toString(),
        };

        const hasStandalonePreset = typeof SwaggerUIBundle.SwaggerUIStandalonePreset !== "undefined";
        const presets = [SwaggerUIBundle.presets.apis];
        if (hasStandalonePreset) {
          presets.push(SwaggerUIBundle.SwaggerUIStandalonePreset);
        }

        SwaggerUIBundle({
          // Force a concrete default so current draft always renders by default.
          url: resolvedDefaultSpec.url,
          urls: resolvedSpecs,
          "urls.primaryName": resolvedDefaultSpec.name,
          dom_id: "#swagger-ui",
          presets,
          layout: hasStandalonePreset ? "StandaloneLayout" : "BaseLayout",
          deepLinking: true,
        });
      };
    </script>
  </body>
</html>
