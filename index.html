<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WID 3.0 API Docs</title>
    <link rel="stylesheet" href="vendor/swagger-ui/swagger-ui.css" />
    <style>
      body { margin: 0; }
      #swagger-ui .topbar { display: none; }
    </style>
  </head>
  <body>
    <div id="swagger-ui"></div>

    <script src="vendor/swagger-ui/swagger-ui-bundle.js"></script>
    <script>
      window.onload = function () {
        SwaggerUIBundle({
          urls: [
            {
              name: "WID 3.0 — National Draft",
              url: "specs/wid-3.0/draft.yaml",
            },
            { 
              name: "Oregon WID 2.8 (reference)", 
              url: "specs/reference/oregon-wid-2.8.yaml" 
            },
            // Reference specs — add an entry here when a state contributes one:
            // { name: "Oregon WID 2.8 (reference)", url: "specs/reference/oregon-wid-2.8.yaml" },
          ],
          "urls.primaryName": "WID 3.0 — National Draft",
          dom_id: "#swagger-ui",
          presets: [
            SwaggerUIBundle.presets.apis,
            SwaggerUIBundle.SwaggerUIStandalonePreset,
          ],
          layout: "BaseLayout",
          deepLinking: true,
        });
      };
    </script>
  </body>
</html>
