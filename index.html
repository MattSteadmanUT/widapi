<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>widapi – API Docs</title>
    <link rel="stylesheet" href="vendor/swagger-ui/swagger-ui.css" />
    <style>
      body { margin: 0; }
      #swagger-ui .topbar { display: none; }
    </style>
  </head>
  <body>
    <div id="swagger-ui"></div>

    <script src="vendor/swagger-ui/swagger-ui-bundle.js"></script>
    <script>
      window.onload = function () {
        SwaggerUIBundle({
          // List every spec file you want to expose.
          // The first entry in `urls` is shown by default.
          urls: [
            {
              name: "widapi",
              url: "swagger/openapi.yaml",
            },
            // Add more specs below as needed, e.g.:
            // { name: "Payments API", url: "swagger/payments.yaml" },
          ],
          "urls.primaryName": "widapi",
          dom_id: "#swagger-ui",
          presets: [
            SwaggerUIBundle.presets.apis,
            SwaggerUIBundle.SwaggerUIStandalonePreset,
          ],
          layout: "BaseLayout",
          deepLinking: true,
        });
      };
    </script>
  </body>
</html>
