openapi: "3.0.3"
info:
  title: widapi
  description: >
    Sample API specification. Replace this with your own API definition.
    Add additional spec files to the `swagger/` directory and update
    `index.html` to reference them.
  version: "1.0.0"
  contact:
    name: widapi team

servers:
  - url: https://api.example.com/v1
    description: Production server

tags:
  - name: health
    description: Service health endpoints

paths:
  /health:
    get:
      tags:
        - health
      summary: Health check
      description: Returns the current health status of the API.
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok

components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
          description: Current health status of the service
